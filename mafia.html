<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛОТЕРЕЯ МАФИЯ | 0.02 TON</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .header { color: #ff0055; text-shadow: 0 0 10px #ff0055; font-size: 22px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .cards-container { display: flex; gap: 10px; perspective: 1000px; filter: grayscale(1) blur(2px); pointer-events: none; transition: 0.5s; }
        .cards-container.active { filter: none; blur: 0; pointer-events: auto; }
        .card { width: 95px; height: 140px; background: #151515; border: 2px solid #333; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; transition: 0.6s; transform-style: preserve-3d; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card.flipped { transform: rotateY(180deg); border-color: #ffd700; background: #111; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .btn-buy { margin-top: 30px; padding: 18px 35px; background: #ff0055; border: none; color: #fff; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; font-weight: bold; box-shadow: 0 0 15px #ff0055; transition: 0.3s; width: 85%; max-width: 300px; }
        .btn-buy:active { transform: scale(0.95); }
        .status-msg { margin-top: 15px; font-size: 11px; color: #888; text-align: center; height: 20px; }
        #ton-connect-btn { margin-top: 20px; transform: scale(0.8); }
    </style>
</head>
<body>

    <div class="header">ЛОТЕРЕЯ МАФИЯ</div>
    <div id="status" class="status-msg">ПОДКЛЮЧИ КОШЕЛЕК И КУПИ БИЛЕТ</div>

    <div class="cards-container" id="deck">
        <div class="card" onclick="chooseCard(0)">🕴️</div>
        <div class="card" onclick="chooseCard(1)">🕴️</div>
        <div class="card" onclick="chooseCard(2)">🕴️</div>
    </div>

    <button id="buy-btn" class="btn-buy" onclick="buyTicket()">КУПИТЬ БИЛЕТ (0.02 TON)</button>
    
    <div id="ton-connect-btn"></div>
    
    <button style="margin-top:20px; background:none; border:none; color:#444; font-family:'Orbitron'; font-size:10px; cursor:pointer;" onclick="window.location.href='banda.html'">ВЕРНУТЬСЯ В БАНДУ</button>

<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/Banda/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";
    let isPaid = false;
    const results = ['💰', '❌', '❌'];

    async function buyTicket() {
        if (!tonConnectUI.connected) {
            alert('Сначала подключи кошелек!');
            return;
        }

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 300,
            messages: [{
                address: MY_WALLET,
                amount: (0.02 * 1000000000).toString() // 0.02 TON
            }]
        };

        try {
            document.getElementById('status').innerText = "ОЖИДАНИЕ ОПЛАТЫ...";
            await tonConnectUI.sendTransaction(transaction);
            
            // Если транзакция прошла
            isPaid = true;
            document.getElementById('deck').classList.add('active');
            document.getElementById('buy-btn').style.display = 'none';
            document.getElementById('status').innerText = "ОПЛАЧЕНО! ВЫБИРАЙ КАРТУ";
            document.getElementById('status').style.color = "#ffd700";
        } catch (e) {
            document.getElementById('status').innerText = "ОШИБКА ОПЛАТЫ";
            document.getElementById('status').style.color = "#ff0055";
        }
    }

    function chooseCard(index) {
        if (!isPaid) return;
        isPaid = false; // Сбрасываем флаг после выбора

        const currentResults = [...results].sort(() => Math.random() - 0.5);
        const cards = document.querySelectorAll('.card');
        
        cards[index].classList.add('flipped');
        cards[index].innerText = currentResults[index];

        if (currentResults[index] === '💰') {
            document.getElementById('status').innerText = "КРАСАВА! +0.05 TON В КУШ!";
            let currentLoot = parseFloat(localStorage.getItem('user_loot') || '0');
            localStorage.setItem('user_loot', (currentLoot + 0.05).toFixed(3));
        } else {
            document.getElementById('status').innerText = "МАСЛИНА... ПОВЕЗЕТ В СЛЕДУЮЩИЙ РАЗ";
            document.getElementById('status').style.color = "#ff0055";
        }

        setTimeout(() => {
            alert('Игра окончена. Купи новый билет для следующей попытки!');
            location.reload();
        }, 2000);
    }
</script>
</body>
</html>
