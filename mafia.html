<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛОТЕРЕЯ МАФИЯ | МАЛИНА</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Верхняя панель с деньгами */
        .stats-top { width: 100%; position: absolute; top: 15px; display: flex; justify-content: space-around; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-item { text-align: center; }
        .val { display: block; font-size: 16px; color: #00ff00; margin-top: 5px; }

        .header { color: #ff0055; text-shadow: 0 0 10px #ff0055; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; margin-top: 60px; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; filter: grayscale(1) blur(3px); pointer-events: none; transition: 0.5s; width: 90%; max-width: 320px; }
        .cards-grid.active { filter: none; blur: 0; pointer-events: auto; }
        .card { height: 110px; background: #151515; border: 2px solid #333; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: 0.6s; }
        .card.flipped { transform: rotateY(180deg); border-color: #ffd700; background: #111; }

        .btn-buy { margin-top: 25px; padding: 18px; background: #ff0055; border: none; color: #fff; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; font-weight: bold; width: 85%; max-width: 300px; box-shadow: 0 0 15px rgba(255,0,85,0.4); }
        .status-msg { margin: 15px 0; font-size: 11px; color: #ffd700; text-align: center; height: 20px; }
        #ton-connect-btn { margin-top: 10px; transform: scale(0.8); }
    </style>
</head>
<body>

    <div class="stats-top">
        <div class="stat-item">ЛИЧНЫЙ КУШ<span id="user-loot" class="val">0.000 TON</span></div>
        <div class="stat-item">ОБЩАК БАНДЫ<span id="global-bank" class="val" style="color:#ffd700">1250.04 TON</span></div>
    </div>

    <div class="header">МАФИЯ: 6 КАРТ</div>
    <div id="status" class="status-msg">ПОДКЛЮЧИСЬ И КУПИ БИЛЕТ</div>

    <div class="cards-grid" id="deck">
        <div class="card" onclick="chooseCard(0)">🕴️</div>
        <div class="card" onclick="chooseCard(1)">🕴️</div>
        <div class="card" onclick="chooseCard(2)">🕴️</div>
        <div class="card" onclick="chooseCard(3)">🕴️</div>
        <div class="card" onclick="chooseCard(4)">🕴️</div>
        <div class="card" onclick="chooseCard(5)">🕴️</div>
    </div>

    <button id="buy-btn" class="btn-buy" onclick="buyTicket()">БИЛЕТ (0.02 TON)</button>
    <div id="ton-connect-btn"></div>
    
    <button style="margin-top:20px; background:none; border:none; color:#444; font-size:10px; cursor:pointer;" onclick="window.location.href='banda.html'">ВЕРНУТЬСЯ НА БАЗУ</button>

<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/Banda/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";
    let isPaid = false;
    const resultsPool = ['💰', '💰', '❌', '❌', '❌', '❌'];

    // Загрузка данных при старте
    function updateDisplay() {
        document.getElementById('user-loot').innerText = (localStorage.getItem('user_loot') || '0.000') + ' TON';
        // Общак пока берем фиксированный или из памяти
        document.getElementById('global-bank').innerText = '1250.04 TON';
    }
    updateDisplay();

    async function buyTicket() {
        if (!tonConnectUI.connected) return alert('Кошелек не на связи!');
        try {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: MY_WALLET, amount: (0.02 * 1000000000).toString() }]
            };
            document.getElementById('status').innerText = "ПРОВЕРЯЕМ ОПЛАТУ...";
            await tonConnectUI.sendTransaction(transaction);
            
            isPaid = true;
            document.getElementById('deck').classList.add('active');
            document.getElementById('buy-btn').style.display = 'none';
            document.getElementById('status').innerText = "ФАРТУ МАСТИ! ВЫБИРАЙ КАРТУ";
        } catch (e) { document.getElementById('status').innerText = "ОПЛАТА НЕ ПРОШЛА"; }
    }

    function chooseCard(index) {
        if (!isPaid) return;
        isPaid = false;

        const shuffled = resultsPool.sort(() => Math.random() - 0.5);
        const cards = document.querySelectorAll('.card');
        cards[index].classList.add('flipped');
        cards[index].innerText = shuffled[index];

        if (shuffled[index] === '💰') {
            document.getElementById('status').innerText = "КРАСАВА! КУШ ТВОЙ!";
            let currentLoot = parseFloat(localStorage.getItem('user_loot') || '0');
            localStorage.setItem('user_loot', (currentLoot + 0.1).toFixed(3)); // Выигрыш
        } else {
            document.getElementById('status').innerText = "МАСЛИНА...";
            document.getElementById('status').style.color = "#ff0055";
        }
        updateDisplay();
        setTimeout(() => { location.reload(); }, 2500);
    }
</script>
</body>
</html>
