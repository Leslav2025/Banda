<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BANDA | Налёт на обменник</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none;
        }

        /* UI Layer */
        .ui-layer { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 10; pointer-events: none; box-sizing: border-box;
        }
        .timer { color: #ff0055; font-size: 24px; text-shadow: 0 0 10px #ff0055; }
        .loot { color: #ffd700; font-size: 18px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        canvas { display: block; background: radial-gradient(circle, #1a0000 0%, #000 100%); }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="timer">TIME: <span id="time">30</span></div>
        <div class="loot">LOOT: <span id="loot">0.000</span> TON</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://leslav2025.github.io/Banda/tonconnect-manifest.json'
});

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timeEl = document.getElementById('time');
const lootEl = document.getElementById('loot');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let time = 30;
let loot = 0;
let gameActive = true;
let policeChance = 0.12;

// Малюємо кастет
function drawKnuckles(x, y) {
    ctx.fillStyle = '#777'; 
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
        ctx.arc(x + (i - 1.5) * 22, y + 8, 9, 0, Math.PI * 2);
    }
    ctx.fillRect(x - 45, y - 15, 90, 15);
    ctx.fill();
    ctx.stroke();
}

// Малюємо пачку грошей
function drawMoney(x, y) {
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(x - 20, y - 10, 40, 20);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(x - 20, y - 10, 40, 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px Arial';
    ctx.fillText('TON', x - 12, y + 4);
}

// Малюємо сирену
function drawPolice(x, y) {
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(x, y, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0000ff';
    ctx.fillRect(x - 4, y - 15, 8, 30);
}

let player = { x: canvas.width / 2, y: canvas.height / 2, targetX: canvas.width / 2, targetY: canvas.height / 2 };
let objects = [];

window.addEventListener('pointerdown', (e) => {
    if (gameActive) {
        player.targetX = e.clientX;
        player.targetY = e.clientY;
    }
});

// Таймер та збереження
const timerInterval = setInterval(() => {
    if (gameActive) {
        time--;
        timeEl.innerText = time;
        if (time <= 0) {
            gameActive = false;
            clearInterval(timerInterval);
            
            // Зберігаємо куш у localStorage
            let currentBalance = parseFloat(localStorage.getItem('user_loot') || '0');
            let newBalance = (currentBalance + loot).toFixed(3);
            localStorage.setItem('user_loot', newBalance);
            
            alert('ГОТОВО!LOOT: ' + loot.toFixed(3) + ' TON. Вали на Малину.');
            window.location.href = 'banda.html';
        }
    }
}, 1000);

const objectSpawnInterval = setInterval(() => {
    if (gameActive) {
        let type = Math.random() < policeChance ? 'police' : 'money';
        objects.push({
            type: type,
            x: Math.random() * (canvas.width - 60) + 30,
            y: Math.random() * (canvas.height - 100) + 50,
            spawnTime: Date.now()
        });
        if(policeChance < 0.4) policeChance += 0.005;
    }
}, 750);

function update() {
    if (!gameActive) return;
    player.x += (player.targetX - player.x) * 0.18;
    player.y += (player.targetY - player.y) * 0.18;

    const now = Date.now();
    objects.forEach((obj, i) => {
        if (now - obj.spawnTime > 1800) {
            objects.splice(i, 1);
            return;
        }
        if (Math.hypot(player.x - obj.x, player.y - obj.y) < 35) {
            objects.splice(i, 1);
            if (obj.type === 'money') {
                loot += 0.005;
                lootEl.innerText = loot.toFixed(3);
            } else {
                loot = Math.max(0, loot - 0.015);
                lootEl.innerText = loot.toFixed(3);
            }
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    objects.forEach(obj => {
        if (obj.type === 'money') drawMoney(obj.x, obj.y);
        else drawPolice(obj.x, obj.y);
    });
    drawKnuckles(player.x, player.y);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
