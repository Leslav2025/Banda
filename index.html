<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BANDA GAME | Базар</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body { margin: 0; padding: 0; background: #050505; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* Кнопка гаманця зверху, як у вашому прикладі */
        #ton-connect-button { margin-top: 15px; margin-bottom: 10px; z-index: 100; }

        .ui-panel { 
            background: rgba(20, 20, 20, 0.9); 
            border: 2px solid #0088cc; 
            border-radius: 15px; 
            padding: 10px; 
            width: 90%; 
            max-width: 400px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
        }

        .stats-row { display: flex; justify-content: space-around; font-size: 16px; }
        .score-box { color: #ffd700; }
        .id-box { color: #0088cc; font-size: 12px; }

        canvas { border: 3px solid #333; border-radius: 12px; background: #000; touch-action: none; }

        /* Вікно вибору */
        #choice-modal { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: #111; 
            padding: 25px; 
            border: 3px solid #0088cc; 
            border-radius: 20px; 
            z-index: 1000; 
            text-align: center; 
            width: 80%; 
        }

        .btn-choice { 
            width: 100%; padding: 15px; margin-top: 10px; 
            border-radius: 10px; border: none; font-weight: bold; 
            font-family: 'Orbitron'; cursor: pointer;
        }
        .btn-banda { background: #0088cc; color: white; }
        .btn-kush { background: #333; color: #ff4757; }
    </style>
</head>
<body>

    <div id="ton-connect-button"></div>

    <div class="ui-panel">
        <div class="id-box" id="player-id">ID: НЕАВТОРИЗОВАНИЙ</div>
        <div class="stats-row">
            <div class="score-box">💰 КУШ: <span id="score">0.000</span> TON</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="350" height="450"></canvas>

    <div id="choice-modal">
        <h2 style="color:#0088cc; font-family:'Orbitron'">КУШ НАБРАНО!</h2>
        <p>Ти назбирав 0.010 TON. Що далі?</p>
        <button class="btn-choice btn-banda" onclick="selectPath('banda')">ВСТУПИТИ В БАНДУ</button>
        <button class="btn-choice btn-kush" onclick="selectPath('kush')">ЗАБРАТИ ВСЕ СОБІ</button>
    </div>

<script>
// Ініціалізація TonConnect
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://leslav2025.github.io/Banda/tonconnect-manifest.json',
    buttonRootId: 'ton-connect-button'
});

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const playerIdEl = document.getElementById('player-id');

let score = 0;
let gameActive = true;
let player = { x: 175, y: 225, targetX: 175, targetY: 225 };
let coins = [];

// Перевірка статусу гаманця
tonConnectUI.onStatusChange(wallet => {
    if (wallet) {
        const addr = wallet.account.address;
        playerIdEl.innerText = "ID: " + addr.substring(0, 4) + "..." + addr.substring(addr.length - 4);
        
        // Авто-перехід, якщо вибір вже був зроблений раніше
        const saved = localStorage.getItem('user_path');
        if (saved === 'banda') window.location.href = 'banda.html';
        if (saved === 'kush') window.location.href = 'kush.html';
    } else {
        playerIdEl.innerText = "ID: НЕАВТОРИЗОВАНИЙ";
    }
});

// Управління тачем (як у вашому коді)
canvas.addEventListener('pointerdown', (e) => {
    const rect = canvas.getBoundingClientRect();
    player.targetX = e.clientX - rect.left;
    player.targetY = e.clientY - rect.top;
});

function spawnCoin() {
    if (coins.length < 5) {
        coins.push({ x: Math.random() * (canvas.width - 20) + 10, y: Math.random() * (canvas.height - 20) + 10 });
    }
}
setInterval(spawnCoin, 1500);

function update() {
    if (!gameActive) return;

    // Рух гравця до точки натискання
    player.x += (player.targetX - player.x) * 0.1;
    player.y += (player.targetY - player.y) * 0.1;

    // Збір монет
    coins.forEach((c, i) => {
        if (Math.hypot(player.x - c.x, player.y - c.y) < 25) {
            coins.splice(i, 1);
            score += 0.001;
            scoreEl.innerText = score.toFixed(3);
            
            if (score >= 0.010) {
                gameActive = false;
                document.getElementById('choice-modal').style.display = 'block';
            }
        }
    });
}

function draw() {
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Малюємо сітку
    ctx.strokeStyle = '#111';
    for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }

    // Малюємо монети
    ctx.fillStyle = '#ffd700';
    coins.forEach(c => {
        ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.stroke();
    });

    // Малюємо гравця (синій як у танку)
    ctx.fillStyle = '#0088cc';
    ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
}

function selectPath(path) {
    localStorage.setItem('user_path', path);
    window.location.href = path + '.html';
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
