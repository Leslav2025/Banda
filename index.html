<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БАНДА | Начало пути</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body {
            margin: 0; padding: 0;
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-canvas {
            display: block;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        /* UI ИНТЕРФЕЙС */
        #ui-layer {
            position: fixed; top: 20px; left: 20px;
            z-index: 10; pointer-events: none;
            font-family: 'Orbitron', sans-serif;
        }

        .stat-box { margin-bottom: 15px; }
        .label { font-size: 10px; color: #0088cc; text-transform: uppercase; letter-spacing: 2px; }
        .value { font-size: 24px; display: block; }
        
        #total-pool { color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
        #personal-balance { color: #00ff00; text-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }

        /* Вспышка урона */
        #damage-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: red; opacity: 0; pointer-events: none;
            transition: opacity 0.1s; z-index: 5;
        }

        /* Модалка выбора */
        #choice-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 100;
        }

        .modal-card {
            background: #111; border: 2px solid #0088cc;
            padding: 30px; border-radius: 20px; text-align: center;
            max-width: 300px; box-shadow: 0 0 40px rgba(0, 136, 204, 0.4);
        }

        .btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .btn-join { background: #0088cc; color: white; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4); }
        .btn-obshak { background: #222; color: #666; }

    </style>
</head>
<body>

    <div id="damage-flash"></div>

    <div id="ui-layer">
        <div class="stat-box">
            <span class="label">ОБЩАК БАНДЫ</span>
            <span id="total-pool" class="value">124.50 TON</span>
        </div>
        <div class="stat-box">
            <span class="label">ТВОЙ КУШ</span>
            <span id="personal-balance" class="value">0.000</span>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="choice-modal">
        <div class="modal-card">
            <h2 style="color:#0088cc; font-family:'Orbitron'; margin-top:0;">КУШ СОБРАН!</h2>
            <p style="font-size:14px; color:#888;">Ты набрал 0.010 TON на базаре. Конкуренты уже близко. Что дальше?</p>
            
            <button class="btn btn-join" onclick="goToBanda()">ВСТУПИТЬ В БАНДУ<br><small style="font-size:9px;">(Перейти к оплате)</small></button>
            
            <button class="btn btn-obshak" onclick="continueSolo()">ИДТИ ОДИНОЧКОЙ<br><small style="font-size:9px;">(Сбросить и играть заново)</small></button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const poolEl = document.getElementById('total-pool');
        const balanceEl = document.getElementById('personal-balance');
        const flash = document.getElementById('damage-flash');
        const modal = document.getElementById('choice-modal');

        let balance = 0.000;
        let poolValue = 124.500;
        let gameActive = true;
        let modalShown = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const player = { x: canvas.width/2, y: canvas.height/2, targetX: canvas.width/2, targetY: canvas.height/2 };
        const coins = [];
        const enemies = [];
        const bullets = [];

        window.addEventListener('pointerdown', (e) => { player.targetX = e.clientX; player.targetY = e.clientY; });

        // Живой счетчик ОБЩАКА
        function updateGlobalPool() {
            poolValue += Math.random() * 0.002;
            poolEl.innerText = poolValue.toFixed(3) + " TON";
            setTimeout(updateGlobalPool, 3000 + Math.random() * 2000);
        }
        updateGlobalPool();

        function spawn() {
            if (gameActive) {
                if (coins.length < 6) coins.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height});
                if (enemies.length < 2 && balance > 0.003) enemies.push({x: Math.random()>0.5?-50:canvas.width+50, y: Math.random()*canvas.height, lastShot: 0});
            }
        }
        setInterval(spawn, 1500);

        function update() {
            if (!gameActive) return;

            player.x += (player.targetX - player.x) * 0.1;
            player.y += (player.targetY - player.y) * 0.1;

            coins.forEach((c, i) => {
                if (Math.hypot(player.x - c.x, player.y - c.y) < 30) {
                    coins.splice(i, 1);
                    balance += 0.001;
                    balanceEl.innerText = balance.toFixed(3);
                }
            });

            enemies.forEach(en => {
                if (Date.now() - en.lastShot > 2500) {
                    const angle = Math.atan2(player.y - en.y, player.x - en.x);
                    bullets.push({x: en.x, y: en.y, vx: Math.cos(angle)*5, vy: Math.sin(angle)*5});
                    en.lastShot = Date.now();
                }
            });

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if (Math.hypot(player.x - b.x, player.y - b.y) < 25) {
                    bullets.splice(i, 1);
                    if (balance > 0) {
                        balance -= 0.002;
                        if (balance < 0) balance = 0;
                        balanceEl.innerText = balance.toFixed(3);
                        flash.style.opacity = 0.5; setTimeout(() => flash.style.opacity = 0, 100);
                    }
                }
            });

            if (balance >= 0.010 && !modalShown) {
                gameActive = false;
                modalShown = true;
                modal.style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Сетка фона
            ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            ctx.fillStyle = "#ffd700";
            coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill(); });

            ctx.fillStyle = "red";
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });

            ctx.fillStyle = "#ffcc00";
            ctx.beginPath(); ctx.arc(player.x, player.y, 20, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black"; ctx.fillRect(player.x-10, player.y+5, 20, 5); // Стилизация
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();

        function goToBanda() { window.location.href = "banda.html"; }
        
        function continueSolo() {
            modal.style.display = 'none';
            balance = 0;
            balanceEl.innerText = "0.000";
            modalShown = false;
            gameActive = true;
        }
    </script>
</body>
</html>
