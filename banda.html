<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>МАЛИНА | BANDA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; padding-bottom: 30px; }
        
        .header-box { text-align: center; margin-top: 20px; }
        .title { color: #ff0055; font-size: 28px; text-shadow: 0 0 15px #ff0055; margin: 0; }
        .rank-badge { background: #ff0055; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 5px; display: inline-block; box-shadow: 0 0 10px #ff0055; }

        .loot-display { margin-top: 30px; text-align: center; }
        .loot-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .loot-val { font-size: 32px; color: #00ff00; display: block; text-shadow: 0 0 10px rgba(0,255,0,0.5); }

        .actions { width: 90%; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 10px; border: 1px solid #ffd700; background: transparent; color: #ffd700; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-green { border-color: #00ff00; color: #00ff00; }

        .market-title { align-self: flex-start; margin-left: 5%; margin-top: 30px; font-size: 12px; color: #555; text-transform: uppercase; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; margin-top: 10px; }
        .item-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .item-card:active { transform: scale(0.95); background: #1a1a1a; }
        .item-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .item-name { font-size: 10px; color: #888; display: block; }
        .item-price { font-size: 14px; color: #ffd700; margin-top: 5px; display: block; }

        .obshak-box { width: 90%; background: #0a0a0a; border: 1px solid #222; border-radius: 15px; margin-top: 30px; padding: 20px; text-align: center; }
        .obshak-label { font-size: 12px; color: #888; }
        .obshak-val { font-size: 26px; color: #ffd700; display: block; margin: 10px 0; }
        
        .top-link { margin-top: 20px; color: #444; font-size: 10px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1 class="title">МАЛИНА</h1>
        <div id="user-rank" class="rank-badge">БОЄЦЬ</div>
    </div>

    <div class="loot-display">
        <span class="loot-label">Твій личний куш:</span>
        <span id="user-loot" class="loot-val">0.000 TON</span>
    </div>

    <div class="actions">
        <button class="btn" onclick="window.location.href='mafia.html'">🎰 ЛОТЕРЕЯ МАФІЯ</button>
        <button class="btn-green" onclick="alert('Общак поповнено!')">СБРОСИТЬ В ОБЩАК</button>
    </div>

    <div class="market-title">ЧЕРНИЙ РИНОК:</div>
    <div class="market-grid">
        <div class="item-card" onclick="buyItem('mask', 0.2)">
            <span class="item-icon">🎭</span>
            <span class="item-name">МАСКА</span>
            <span class="item-price">0.2 TON</span>
        </div>
        <div class="item-card" onclick="buyItem('key', 0.5)">
            <span class="item-icon">🔑</span>
            <span class="item-name">ВІДМИЧКА</span>
            <span class="item-price">0.5 TON</span>
        </div>
    </div>

    <div class="obshak-box">
        <span class="obshak-label">НАШ ОБЩАК (нажми на цифри)</span>
        <span class="obshak-val" onclick="window.location.href='safe.html'">1246.53 TON</span>
        <span style="color: #ff0055; font-size: 10px;">Клянусь, завтра буде більше</span>
    </div>

    <div class="top-link" onclick="window.location.href='top.html'">ПЕРЕГЛЯНУТИ ТОП АВТОРИТЕТІВ</div>

    <script>
        // Оновлення екрану
        function updateUI() {
            const loot = localStorage.getItem('user_loot') || '0.000';
            document.getElementById('user-loot').innerText = loot + ' TON';
            
            if(localStorage.getItem('has_mask') === 'true') {
                document.getElementById('user-rank').innerText = 'АНІНІМ';
                document.getElementById('user-rank').style.background = '#555';
            }
        }

        // Функція покупки
        function buyItem(id, price) {
            let currentLoot = parseFloat(localStorage.getItem('user_loot') || '0');
            
            if (localStorage.getItem('has_' + id) === 'true') {
                alert('У тебе вже є цей товар!');
                return;
            }

            if (currentLoot >= price) {
                currentLoot -= price;
                localStorage.setItem('user_loot', currentLoot.toFixed(3));
                localStorage.setItem('has_' + id, 'true');
                alert('Покупка успішна! Твій статус оновлено.');
                updateUI();
            } else {
                alert('Мало налу! Зароби в лотереї Мафія.');
            }
        }

        updateUI();
    </script>
</body>
</html>
